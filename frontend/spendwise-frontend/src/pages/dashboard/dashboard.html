<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SpendWise - Dashabord</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="./dashboard.css">
    </head>
    <body>
        <nav class="navbar bg-body-tertiary" id="navbar">
            <div class="container-fluid" >
                <a class="navbar-brand" href="#">SpendWise</a>
                <button class="toggler-custom" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <div id="collapseContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Nuova transazione</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Modifica transazione esistente</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <form id="logoutForm">
                                <button class="nav-link" type="submit">Disconnettiti</button>
                            </form>
                        </li>
                    </ul>
                </div>
                </div>
            </div>
        </nav>
        
        <div class="container-full mt-2">
            <div class="row justify-content-center">
                <div class="col-10">
                    <div class="row justify-content-between">
                        <div class="col-5 text-center border rounded-2">
                            <p class="fs-custom-10 mb-1 text-secondary">Totale entrate mensili</p>
                            <h3 class="fw-bold" id="totalIncome">0</h3>
                        </div>
                        <div class="col-5 text-center border rounded-2">
                            <p class="fs-custom-10 mb-1 text-secondary">Totale spese mensili</p>
                            <h3 class="fw-bold" id="totalExcpenses">0</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <br>

        <div class="container">
            <div class="row">
                <div class="col-12">
                    <h3 id="transactionsTitle">Transazioni registrate</h3>
                    <div class="border rounded-2 mt-2">
                        <div class="accordion accordion-flush" id="accordionFlushExample">
                            
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script type="module" src="./dashboard.ts"></script>
    </body>
</html>
