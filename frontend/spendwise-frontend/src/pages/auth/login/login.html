<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise - Login</title>
    <link rel="stylesheet" href="./login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-5 h-75-custom">
      <div class="row justify-content-center">
        <div class="col-12 d-flex justify-content-center align-items-center">
          <div class="login-card" style="width: 18rem; height: 100%;">
            <div class="card-body">
                <div class="d-flex flex-column gap-5">
                    <h5 class="card-title text-center">Bentornato in Spendwise, procedi pure con il tuo login</h5>
                    <div class="my-5" id="allertBox">
                      
                    </div>
                    <form id="loginForm">
                        <div class="mb-3">
                          <label for="email" class="form-label">Email</label>
                          <input type="email" name="email" class="form-control" id="email" aria-describedby="emailHelp">
                        </div>
                        <div class="mb-3">
                          <label for="password" class="form-label">Password</label>
                          <input type="password" name="password" class="form-control" id="password">
                        </div>
                        <div class="d-flex flex-column mt-5 gap-3 justify-content-center">
                            <button type="submit" class="btn btn-primary">Accedi adesso</button>
                            <a href="../register/register.html" class=" text-center fs-10">Non ho ancora un account</a>
                        </div>
                    </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="./login.ts"></script>
  </body>
</html>
